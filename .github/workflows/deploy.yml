name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Find and Build Web Artifact
        run: |
          # Automatically find your pubspec.yaml file and jump to it
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" -print -quit)
          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "Found project directory at: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          # FORCE WEB CONFIGURATION
          flutter create . --platforms web
          
          # Build the web app
          flutter build web --release
          
          # Save the path of the built folder for the deployment step
          echo "BUILT_DIR=$PROJECT_DIR/build/web" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages Repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: lestergiannesuerte/lestersuerte.github.io
          publish_dir: ${{ env.BUILT_DIR }}
          publish_branch: main
          
